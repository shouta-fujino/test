name: restrict-master-pr

on:
  pull_request:
    branches:
      - master

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Allow only develop
        run: |
          if [[ "${{ github.head_ref }}" != "develop" ]]; then
            echo "Only develop can open PR to master"
            exit 1
          fi